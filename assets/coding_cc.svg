<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="100%" height="100%">
    
<defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0d1117" />
        <stop offset="100%" stop-color="#010409" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#161b22" />
        <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#3fb950" />
        <stop offset="100%" stop-color="#2ea043" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#58a6ff" />
        <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
</defs>

    <rect x="10" y="10" width="560" height="280" rx="20" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="2" filter="url(#shadow)" />
    
    <!-- Header -->
    <circle cx="40" cy="50" r="15" fill="#f1e05a" opacity="0.2" />
    <circle cx="40" cy="50" r="6" fill="#f1e05a" />
    
    <text x="75" y="50" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff" font-weight="700" alignment-baseline="middle">CodeChef</text>
    <text x="75" y="75" font-family="-apple-system, sans-serif" font-size="14" fill="#8b949e" font-weight="500">Competitive Programming</text>
    
    <path d="M 30 100 L 550 100" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <!-- Content -->
    <g transform="translate(30, 120)">
        <text x="0" y="20" font-family="-apple-system" font-size="16" fill="#c9d1d9">⭐ 4 Star Coder</text>
       <text x="0" y="60" font-family="-apple-system" font-size="16" fill="#c9d1d9">⭐ Highest Rating: 1950</text>
       <text x="0" y="100" font-family="-apple-system" font-size="16" fill="#c9d1d9">⭐ Global Rank top 1000</text>
    </g>
</svg>