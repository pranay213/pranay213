<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="macBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="24" fill="#0a0a0a" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  
  <!-- MacOS Window -->
  <g transform="translate(30, 40)">
    <rect width="440" height="320" rx="12" fill="url(#macBg)" stroke="#333" stroke-width="2"/>
    <rect width="440" height="40" rx="12" fill="#2d2d2d"/>
    <rect y="20" width="440" height="20" fill="#2d2d2d"/>
    
    <circle cx="25" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="45" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="65" cy="20" r="6" fill="#27c93f"/>
    <text x="220" y="25" font-family="monospace" font-size="12" fill="#888" text-anchor="middle">developer.go</text>
    
    <!-- Code -->
    <g font-family="monospace" font-size="14" transform="translate(20, 80)">
      <text y="0"><tspan fill="#f92672">package</tspan> <tspan fill="#f8f8f2">main</tspan></text>
      
      <text y="40"><tspan fill="#f92672">import</tspan> <tspan fill="#e6db74">"fmt"</tspan></text>
      
      <text y="80"><tspan fill="#66d9ef">type</tspan> <tspan fill="#a6e22e">Developer</tspan> <tspan fill="#66d9ef">struct</tspan> {</text>
      <text y="105">  Name   <tspan fill="#66d9ef">string</tspan></text>
      <text y="130">  Skills []<tspan fill="#66d9ef">string</tspan></text>
      <text y="155">}</text>
      
      <text y="195"><tspan fill="#66d9ef">func</tspan> <tspan fill="#a6e22e">main</tspan>() {</text>
      <text y="220">  dev <tspan fill="#f92672">:=</tspan> Developer{</text>
      <text y="245">    Name: <tspan fill="#e6db74">"Pranay Kumar"</tspan>,</text>
      <text y="270">  }</text>
      <text y="295">}</text>
      
      <!-- Blinking Cursor -->
      <rect x="25" y="282" width="8" height="15" fill="#f8f8f2">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>