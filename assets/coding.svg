    <text y="120">    <tspan fill="#79c0ff">this</tspan>.coffee = <tspan fill="#79c0ff">true</tspan>;</text>
    <text y="150">  }</text>
    <text y="180">  <tspan fill="#d2a8ff">code</tspan>() { <tspan fill="#ff7b72">return</tspan> <tspan fill="#a5d6ff">"🚀"</tspan>; }</text>
    <text y="210">}</text>
