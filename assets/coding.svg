<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" rx="15" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#0d1117"/>
  <!-- macOS window controls -->
  <circle cx="35" cy="35" r="6" fill="#ff5f56"/>
  <circle cx="55" cy="35" r="6" fill="#ffbd2e"/>
  <circle cx="75" cy="35" r="6" fill="#27c93f"/>
  
  <!-- Code content -->
  <g font-family="monospace" font-size="14" transform="translate(30, 75)">
    <text y="0"><tspan fill="#ff7b72">class</tspan> <tspan fill="#d2a8ff">Developer</tspan> {</text>
