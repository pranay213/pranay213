<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f29" />
      <stop offset="100%" stop-color="#0a0c10" />
    </linearGradient>
    <filter id="glowCard">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="400" rx="24" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  
  <g transform="translate(100, 70)">
    <!-- High tech hexagon design -->
    <polygon points="150,20 250,75 250,185 150,240 50,185 50,75" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.5"/>
    <polygon points="150,40 230,85 230,175 150,220 70,175 70,85" fill="none" stroke="#4facfe" stroke-width="1" opacity="0.8">
       <animateTransform attributeName="transform" type="rotate" from="0 150 130" to="360 150 130" dur="20s" repeatCount="indefinite"/>
    </polygon>
    
    <circle cx="150" cy="130" r="40" fill="rgba(0, 242, 254, 0.1)" stroke="#00f2fe" stroke-width="2" filter="url(#glowCard)"/>
    <path d="M135,115 L165,115 L165,145 L135,145 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="150" cy="130" r="5" fill="#f093fb"/>
    
    <!-- Floating nodes -->
    <circle cx="50" cy="75" r="8" fill="#f5576c"><animate attributeName="cy" values="75;65;75" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="185" r="8" fill="#00f2fe"><animate attributeName="cy" values="185;195;185" dur="4s" repeatCount="indefinite"/></circle>
  </g>
  
  <text x="250" y="320" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">System Architecture</text>
  <text x="250" y="350" font-family="-apple-system, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Designing for Scale & Performance</text>
</svg>