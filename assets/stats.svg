<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" width="100%" height="100%">
        <style>
            @keyframes scaleIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
            .stat-card { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
            .s1 { animation-delay: 0.1s; } .s2 { animation-delay: 0.2s; } .s3 { animation-delay: 0.3s; }
            .s4 { animation-delay: 0.4s; } .s5 { animation-delay: 0.5s; }
        </style>
        <g transform="translate(0, 10)">
            <g class="stat-card s1" transform-origin="95px 40px">
                <rect x="0" y="0" width="190" height="80" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
                <text x="70" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#58a6ff" font-weight="600">Repositories</text>
                <text x="70" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">82</text>
            </g>
            
            <g class="stat-card s2" transform-origin="297px 40px">
                <rect x="202" y="0" width="190" height="80" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
                <text x="272" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#e3b341" font-weight="600">Stars Earned</text>
                <text x="272" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">61</text>
            </g>
            
            <g class="stat-card s3" transform-origin="500px 40px">
                <rect x="405" y="0" width="190" height="80" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
                <text x="475" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#a371f7" font-weight="600">Contributions</text>
                <text x="475" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">3934</text>
            </g>
            
            <g class="stat-card s4" transform-origin="702px 40px">
                <rect x="607" y="0" width="190" height="80" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
                <text x="677" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#a371f7" font-weight="600">Followers</text>
                <text x="677" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">2</text>
            </g>
            
            <g class="stat-card s5" transform-origin="905px 40px">
                <rect x="810" y="0" width="190" height="80" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
                <text x="880" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#3fb950" font-weight="600">Following</text>
                <text x="880" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">9</text>
            </g>
        </g>
    </svg>