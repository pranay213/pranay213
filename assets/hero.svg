<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="100%" height="100%">
    
<defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0d1117" />
        <stop offset="100%" stop-color="#010409" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#161b22" />
        <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#3fb950" />
        <stop offset="100%" stop-color="#2ea043" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#58a6ff" />
        <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
</defs>

    <rect width="1200" height="500" rx="20" fill="url(#bg)" />
    
    <!-- Decorative background elements -->
    <circle cx="200" cy="100" r="150" fill="#58a6ff" opacity="0.05" filter="url(#glow)" />
    <circle cx="1000" cy="400" r="200" fill="#8a2be2" opacity="0.05" filter="url(#glow)" />
    
    <!-- Grid -->
    <path d="M0 50 L1200 50 M0 100 L1200 100 M0 150 L1200 150 M0 200 L1200 200 M0 250 L1200 250 M0 300 L1200 300 M0 350 L1200 350 M0 400 L1200 400 M0 450 L1200 450" stroke="#ffffff" stroke-width="1" opacity="0.02" />
    <path d="M50 0 L50 500 M100 0 L100 500 M150 0 L150 500 M200 0 L200 500 M250 0 L250 500 M300 0 L300 500 M350 0 L350 500 M400 0 L400 500 M450 0 L450 500 M500 0 L500 500 M550 0 L550 500 M600 0 L600 500 M650 0 L650 500 M700 0 L700 500 M750 0 L750 500 M800 0 L800 500 M850 0 L850 500 M900 0 L900 500 M950 0 L950 500 M1000 0 L1000 500 M1050 0 L1050 500 M1100 0 L1100 500 M1150 0 L1150 500" stroke="#ffffff" stroke-width="1" opacity="0.02" />

    <g transform="translate(100, 100)">
        <text x="0" y="40" font-family="-apple-system, sans-serif" font-size="24" fill="#8b949e" font-weight="600">HELLO, I'M</text>
        <text x="0" y="110" font-family="-apple-system, sans-serif" font-size="80" fill="#ffffff" font-weight="900" letter-spacing="-2">Pranay Kumar</text>
        <text x="0" y="160" font-family="-apple-system, sans-serif" font-size="32" fill="url(#textGrad)" font-weight="700">Senior Full Stack Developer</text>
        
        <text x="0" y="210" font-family="-apple-system, sans-serif" font-size="20" fill="#8b949e" font-weight="400">Architecting and scaling robust applications</text>
        
        <!-- CTA Buttons -->
        <rect x="0" y="250" width="160" height="50" rx="25" fill="#58a6ff" />
        <text x="80" y="280" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" font-weight="700" text-anchor="middle">View Projects</text>
        
        <rect x="180" y="250" width="160" height="50" rx="25" fill="none" stroke="#58a6ff" stroke-width="2" />
        <text x="260" y="280" font-family="-apple-system, sans-serif" font-size="16" fill="#58a6ff" font-weight="700" text-anchor="middle">Contact Me</text>
        
        <!-- Stats -->
        <rect x="0" y="340" width="400" height="60" rx="15" fill="rgba(255,255,255,0.05)" />
        <text x="40" y="375" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" font-weight="600">6+ Years Exp</text>
        <circle cx="150" cy="370" r="4" fill="#3fb950" />
        <text x="170" y="375" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" font-weight="600">React &amp; Node.js</text>
        <circle cx="310" cy="370" r="4" fill="#3fb950" />
        <text x="330" y="375" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" font-weight="600">AWS</text>
    </g>

    <!-- Developer illustration -->
    <g transform="translate(750, 100)">
        <circle cx="150" cy="150" r="140" fill="rgba(88, 166, 255, 0.1)" stroke="#58a6ff" stroke-width="2" stroke-dasharray="10 5">
             <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="20s" repeatCount="indefinite" />
        </circle>
        <!-- Abstract server and code representation -->
        <rect x="80" y="60" width="140" height="180" rx="10" fill="#161b22" stroke="#30363d" stroke-width="4" filter="url(#shadow)" />
        <rect x="100" y="80" width="100" height="20" rx="5" fill="#58a6ff" opacity="0.8" />
        <rect x="100" y="120" width="80" height="20" rx="5" fill="#3fb950" opacity="0.8" />
        <rect x="100" y="160" width="100" height="20" rx="5" fill="#8a2be2" opacity="0.8" />
        
        <!-- Floating elements -->
        <circle cx="40" cy="80" r="15" fill="#f85149" filter="url(#glow)">
             <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="260" cy="200" r="20" fill="#ff7b72" filter="url(#glow)">
             <animate attributeName="cy" values="200;215;200" dur="4s" repeatCount="indefinite" />
        </circle>
    </g>
</svg>
